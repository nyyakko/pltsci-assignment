name: run tests

on:
  push:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.5'

      - name: set up python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: build docker image
        run: docker build -t pltsci-assignment-test-server .

      - name: start server
        run: docker run --rm -d -p 8080:8080 --name server pltsci-assignment-test-server

      - name: wait for server
        run: |
          for i in {1..5}; do
            if curl -s http://localhost:8080/v1/health > /dev/null; then
              echo "server is ready!"
              exit 0
            fi
            echo "waiting for server... ($i/30)"
            sleep 1
          done
          echo "server failed to start"
          docker logs server
          exit 1

      - name: install python deps
        run: pip install -r requirements.txt

      - name: run pytest
        env:
          API_BASE_URL: http://localhost:8080/v1
        run:
          pytest -v

      - name: stop server
        if: always()
        run: docker stop server
